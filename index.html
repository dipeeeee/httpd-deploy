<!DOCTYPE html>
<html>
<head>
    <title>Car World</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0b0b;
            color: white;
        }

        /* HEADER */
        header {
            background: linear-gradient(90deg, #111, #444);
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 42px;
        }

        header p {
            margin: 5px 0 0;
        }

        /* HERO */
        .hero {
            height: 400px;
            background: url('https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 2px 2px 10px black;
        }

        /* SECTION */
        .section {
            padding: 40px 20px;
            text-align: center;
        }

        .section h2 {
            color: #00c3ff;
        }

        /* CARDS */
        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: #1a1a1a;
            margin: 15px;
            padding: 15px;
            width: 260px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,195,255,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.07);
            box-shadow: 0 0 25px #00c3ff;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
        }

        footer {
            background: #111;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🚗 CAR WORLD</h1>
    <p>Luxury • Performance • Innovation</p>
</header>

<div class="hero">
    Explore Premium Cars
</div>

<div class="section">
    <h2>🔥 Top Car Brands</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.pexels.com/photos/120049/pexels-photo-120049.jpeg">
            <h3>Mercedes-Benz</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg">
            <h3>BMW</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg">
            <h3>Audi</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/248687/pexels-photo-248687.jpeg">
            <h3>Lamborghini</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg">
            <h3>Ferrari</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg">
            <h3>Porsche</h3>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Car World | Deployed via Jenkins 🚀</p>
</footer>

</body>
</html>
