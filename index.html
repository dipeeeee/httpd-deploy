<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car World</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        header {
            background: #111;
            color: #fff;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #e8491d;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .hero {
            background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center center/cover;
            height: 400px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        .cars {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .car {
            background: white;
            padding: 15px;
            margin: 10px;
            width: 250px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .car img {
            width: 100%;
        }
        footer {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>🚗 Car World</h1>
    <p>Explore Luxury & Performance Cars</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Drive Your Dream Car
</div>

<div class="container">
    <h2>Featured Cars</h2>
    <div class="cars">

        <div class="car">
            <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" alt="Car 1">
            <h3>Sports Car</h3>
            <p>High speed and performance.</p>
        </div>

        <div class="car">
            <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" alt="Car 2">
            <h3>Luxury Car</h3>
            <p>Comfort and elegance.</p>
        </div>

        <div class="car">
            <img src="https://images.unsplash.com/photo-1493238792000-8113da705763" alt="Car 3">
            <h3>SUV</h3>
            <p>Powerful and spacious.</p>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Car World | Designed for Jenkins Deployment 🚀</p>
</footer>

</body>
</html>
