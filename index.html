<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 World</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    background: linear-gradient(90deg, red, black);
    text-align: center;
    padding: 20px;
}

header h1 {
    margin: 0;
    font-size: 40px;
}

nav {
    background: #111;
    text-align: center;
    padding: 10px;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: red;
}

.hero {
    background: url('https://upload.wikimedia.org/wikipedia/commons/3/3e/Formula_One_car_2022.jpg') no-repeat center/cover;
    height: 450px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 45px;
    font-weight: bold;
    text-shadow: 2px 2px 10px black;
}

.section {
    padding: 40px;
    text-align: center;
}

.cards {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: #1a1a1a;
    margin: 15px;
    padding: 15px;
    width: 280px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

footer {
    background: #111;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<header>
    <h1>🏎️ F1 WORLD</h1>
    <p>Speed • Power • Champions</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">Drivers</a>
</nav>

<div class="hero">
    Feel the Speed of Formula 1
</div>

<!-- CARS SECTION -->
<div class="section">
    <h2>🔥 F1 Cars</h2>
    <div class="cards">

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Red_Bull_Racing_F1_Car.jpg">
            <h3>Red Bull Car</h3>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Ferrari_F1_Car.jpg">
            <h3>Ferrari Car</h3>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Mercedes_F1_Car.jpg">
            <h3>Mercedes Car</h3>
        </div>

    </div>
</div>

<!-- DRIVERS SECTION -->
<div class="section">
    <h2>🏁 Top Drivers</h2>
    <div class="cards">

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/1e/Max_Verstappen_2022.jpg">
            <h3>Max Verstappen</h3>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Lewis_Hamilton_2022.jpg">
            <h3>Lewis Hamilton</h3>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Charles_Leclerc_2022.jpg">
            <h3>Charles Leclerc</h3>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 F1 World | Deployed using Jenkins 🚀</p>
</footer>

</body>
</html>
