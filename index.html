<!DOCTYPE html>
<html>
<head>
    <title>F1 World</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0b0b;
            color: white;
        }

        /* HEADER */
        header {
            background: linear-gradient(90deg, red, black);
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 2px;
        }

        header p {
            margin: 5px 0 0;
            font-size: 18px;
        }

        /* HERO */
        .hero {
            height: 400px;
            background: url('https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
            text-shadow: 2px 2px 10px black;
        }

        /* SECTION */
        .section {
            padding: 40px 20px;
            text-align: center;
        }

        .section h2 {
            margin-bottom: 20px;
            color: red;
        }

        /* CARDS */
        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: #1a1a1a;
            margin: 15px;
            padding: 15px;
            width: 260px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.07);
            box-shadow: 0 0 25px red;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin-top: 10px;
        }

        /* FOOTER */
        footer {
            background: #111;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
        }

    </style>
</head>

<body>

<header>
    <h1>🏎️ F1 WORLD</h1>
    <p>Speed • Power • Champions</p>
</header>

<div class="hero">
    Feel The Speed
</div>

<!-- CARS -->
<div class="section">
    <h2>🔥 F1 Cars</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg">
            <h3>Red Bull Style Car</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg">
            <h3>Ferrari Style Car</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg">
            <h3>Mercedes Style Car</h3>
        </div>

    </div>
</div>

<!-- DRIVERS -->
<div class="section">
    <h2>🏁 Top Drivers</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.pexels.com/photos/614810/pexels-photo-614810.jpeg">
            <h3>Max Verstappen</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg">
            <h3>Lewis Hamilton</h3>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/2379004/pexels-photo-2379004.jpeg">
            <h3>Charles Leclerc</h3>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 F1 World | Deployed using Jenkins 🚀</p>
</footer>

</body>
</html>
